baseURL = 'https://chegl.com/'
languageCode = 'en-us'
title = 'FindLegalHelp - Find the Right Lawyer for Your Case'
theme = 'lawyer'

[params]
  # SEO 优化描述
  description = 'Find qualified lawyers near you. Free consultation, no win no fee options. Get matched with top-rated attorneys for personal injury, family law, criminal defense & more.'
  
  # 核心关键词
  keywords = [
    'find a lawyer',
    'lawyer near me',
    'hire an attorney',
    'personal injury lawyer',
    'family law attorney',
    'criminal defense lawyer',
    'free consultation lawyer',
    'legal representation'
  ]
  
  author = 'FindLegalHelp Team'
  images = ['images/og-image.png']
  
  # 联系信息
  phone = '1-800-XXX-XXXX'
  email = 'info@chegl.com'
  
  # 主题参数
  env = 'production'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = 'github-dark'
    lineNos = false

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[sitemap]
  changefreq = 'weekly'
  filename = 'sitemap.xml'
  priority = 0.5

[services]
  [services.rss]
    limit = 20

# Permalink structure
[permalinks]
  posts = '/posts/:slug/'
  pages = '/:slug/'
