baseURL = 'https://chegl.com/'
languageCode = 'en-us'
title = 'TechTutorials Pro'
theme = 'custom'

[params]
  # SEO 优化描述（包含主要关键词）
  description = 'Free programming tutorials for beginners. Learn Python, web development, Git, and coding step-by-step. Practical guides for aspiring developers.'
  
  # 核心关键词（分层策略）
  keywords = [
    # 一级关键词
    'programming tutorials for beginners',
    'learn to code free',
    'web development tutorials',
    
    # 二级关键词
    'python tutorials',
    'coding tutorials step by step',
    'software development guides',
    
    # 长尾关键词
    'how to learn programming from scratch',
    'free coding courses online',
    'beginner programming lessons'
  ]
  
  author = 'TechTutorials Team'
  images = ['images/og-image.png']
  
  env = 'production'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  ShowAllPagesInArchive = true
  ShowPageNums = true
  ShowToc = true
  TocOpen = true
  
  # AdSense (add after approval)
  # googleAdsense = 'ca-pub-XXXXXXXXXXXXXXXX'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = 'github-dark'
    lineNos = false

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[sitemap]
  changefreq = 'weekly'
  filename = 'sitemap.xml'
  priority = 0.5

[services]
  [services.rss]
    limit = 20

# Permalink structure
[permalinks]
  posts = '/posts/:slug/'
  pages = '/:slug/'
