<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <meta name="keywords" content="{{ with .Site.Params.keywords }}{{ delimit . "," }}{{ end }}">
    
    <title>{{ if .IsHome }}{{ .Site.Title }} - Find the Right Lawyer for Your Case{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    
    {{ hugo.Generator }}
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- 主题 CSS -->
    <link rel="stylesheet" href="{{ "css/lawyer-theme.css" | relURL }}">
    
    <!-- Favicon -->
    <link rel="icon" href="{{ "favicon.ico" | relURL }}">
    
    <!-- Schema.org -->
    <meta property="og:url" content="{{ .Permalink }}">
    <meta property="og:site_name" content="{{ .Site.Title }}">
    <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
    <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
    <meta name="twitter:card" content="summary_large_image">
    
    {{ partial "head-custom.html" . }}
</head>
<body>
    {{ block "main" . }}{{ end }}
    
    <!-- 页脚 -->
    {{ partial "footer.html" . }}
    
    <!-- 通用脚本 -->
    <script>
        // 表单验证
        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', function(e) {
                const required = form.querySelectorAll('[required]');
                let valid = true;
                
                required.forEach(field => {
                    if (!field.value.trim()) {
                        valid = false;
                        field.style.borderColor = 'var(--urgent)';
                    } else {
                        field.style.borderColor = 'var(--border)';
                    }
                });
                
                if (!valid) {
                    e.preventDefault();
                    alert('Please fill in all required fields.');
                }
            });
        });
        
        // 电话追踪
        document.querySelectorAll('a[href^="tel:"]').forEach(link => {
            link.addEventListener('click', function() {
                if (typeof gtag !== 'undefined') {
                    gtag('event', 'click', {
                        event_category: 'phone',
                        event_label: 'click_to_call'
                    });
                }
            });
        });
    </script>
</body>
</html>
